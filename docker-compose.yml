services:
  postgres:
    image: postgres:16-alpine
    container_name: itam_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: itam_db
      POSTGRES_USER: itam_user
      POSTGRES_PASSWORD: 12345
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U itam_user -d itam_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    name: itam_postgres_data