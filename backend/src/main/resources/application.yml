spring:
  application:
    name: itam

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:itam_db}
    username: ${DB_USERNAME:itam_user}
    password: ${DB_PASSWORD:12345}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      # KHÔNG dùng create/update ở môi trường thực tế — Flyway quản lý schema
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        # dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api/v1

logging:
  level:
    com.company.itam: DEBUG
    org.springframework.security: INFO